tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['--enable-preview']
}

test {
    // this tells the tests that we don't have a graphical environment TravisCI, SemaphoreCI etc need this.
    // systemProperty 'java.awt.headless', 'false'
    // copy the Gradle JVM properties down to the test JVM so that SemaphoreCI can ignore the tests that don't work in the headless environment
    //systemProperties = System.getProperties()
    if (System.properties.containsKey('java.awt.headless')) {
        systemProperty 'java.awt.headless', System.getProperty('java.awt.headless')
    }

    // Reduce forks for CI stability. High parallelism in GUI tests causes crashes.
    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1

    useJUnitPlatform()

    moduleOptions {
        runOnClasspath = true
    }

    // Ensure we see standard output and error in the CI logs when a crash occurs
    testLogging {
        showStandardStreams = true
        showExceptions = true
        showCauses = true
    }

    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat = "full"
    }
    reports {
        junitXml.required = true
        html.required = true
    }

    // This setting passes arguments directly to the JVM running your tests.
    // It is necessary because AssertJ-Swing's underlying utility (FEST-Reflect)
    // uses reflection to access internal Java APIs (like java.util.TimerTask),
    // which are locked down by the Java Module System (Jigsaw) in Java 9 and newer.
    jvmArgs = [
            '--add-opens', 'java.base/java.util=ALL-UNNAMED',
            '--add-opens', 'java.desktop/sun.awt=ALL-UNNAMED',
            '--add-opens', 'java.desktop/java.awt=ALL-UNNAMED',
            '--add-opens', 'java.desktop/javax.swing=ALL-UNNAMED',
            '--add-opens', 'java.desktop/sun.swing=ALL-UNNAMED'
    ]
}

