jacoco {
    toolVersion = "0.8.13"
}

jacocoTestReport {
    group = 'verification'
    reports {
        xml.required = true
        html.required = true
    }
}

plugins.withType(JacocoPlugin).configureEach {
    tasks["test"].finalizedBy 'jacocoTestReport'
}

check.dependsOn jacocoTestReport


// docker run -d --name sonarqube -p 9000:9000 sonarqube:8.4.2-community
// http://localhost admin admin
sonar {
    properties {
        property "sonar.projectName", "Java Picture Organizer"
        property "sonar.projectKey", "richardeigenmann_JPO"
        property "sonar.coverage.jacoco.xmlReportPaths", project.layout.buildDirectory.dir('reports/jacoco/test/jacocoTestReport.xml').get().asFile.absolutePath
        property "sonar.sources", "src/main"
        property "sonar.tests", "src/test"
        property "sonar.java.binaries", project.layout.buildDirectory.dir('classes/java/main').get().asFile.absolutePath
        property "sonar.tests.binaries", project.layout.buildDirectory.dir('classes/java/test').get().asFile.absolutePath

        property "sonar.gradle.skipCompile", true
        property "sonar.organization", "richardeigenmann-github"
        property "sonar.host.url", "https://sonarcloud.io"
    }
}

project.tasks["sonar"].dependsOn jacocoTestReport

jar {
    manifest {
        attributes(
                "Class-Path": configurations.runtimeClasspath.collect { it.getName() }.join(' '),
                "Main-Class": 'org.jpo.Main',
                'Permissions': 'all-permissions'
        )
        attributes(
                [ "Copy": "(c) 2001-2026 Richard Eigenmann, Richard Eigenmann, Zürich, Switzerland" ], "Copyright"
        )
    }
    into ('org/jpo/images') { from 'src/images' }
}

javadoc.onlyIf { !project.hasProperty('skipJavadoc') }

javadoc {
    options.encoding = "UTF-8"
    options.addBooleanOption('-enable-preview', true)
    options.addStringOption('-release', '25')
    // gradle doesn't copy the doc-files images!
    // this option is ignored
    options.docFilesSubDirs = true
    /*doFirst {
        options.modulePath = [] + classpath.files
        options.classpath = []
    }*/
    doLast {
        def javadocDir = layout.buildDirectory.dir("docs/javadoc/org.jpo")

        println "${project.layout.buildDirectory}/docs/javadoc/org/jpo/eventbus/doc-files"
        // instead we have to copy explicitly!
        println "Copying doc-files for org.jpo.eventbus..."
        copy {
            from "src/main/java/org/jpo/eventbus/doc-files"
            into javadocDir.dir("org/jpo/eventbus/doc-files")
            include "*.png"
        }
        println "${project.layout.buildDirectory}/docs/javadoc/org/jpo/gui/swing/doc-files"
        copy {
            from "src/main/java/org/jpo/gui/swing/doc-files"
            into javadocDir.dir("org/jpo/gui/swing/doc-files")
            include "*.png"
        }
        println "${project.layout.buildDirectory}/docs/javadoc/org/jpo/gui/doc-files"
        copy {
            from "src/main/java/org/jpo/gui/doc-files"
            into javadocDir.dir("org/jpo/gui/doc-files")
            include "*.png"
        }
    }
}

import java.awt.Desktop

tasks.register('openJavadocInBrowser') {
    dependsOn 'javadoc'
    group = 'documentation'
    doLast {
        def docFile = new File(project.rootDir, "build/docs/javadoc/index.html")
        Desktop.getDesktop().browse(docFile.toURI())
    }
}





tasks.register('uploadCoreJavadoc', Exec) {
    group = 'website'
    description = 'Publishes the Core JPO Javadoc'
    dependsOn javadoc
    // note that the ssh key of sourceforge needs to be in /home/richi/.ssh/id_rsa
    // and that the known_hosts needs to have the host key ssh-keyscan -t rsa web.sourceforge.net
    commandLine('rsync', '-avP', "${project.layout.buildDirectory}/docs/javadoc", 'richieigenmann@web.sourceforge.net:/home/project-web/j-po/htdocs/core/javadoc')
}

