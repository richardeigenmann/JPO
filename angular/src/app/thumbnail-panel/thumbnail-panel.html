<h1>{{ navigator()?.getTitle() }}</h1>

<div class="panel-container" [style.--thumbnail-width.px]="thumbnailWidth">
  <div class="slider-container">
    <label for="zoom">Zoom:</label>
    <input type="range" id="zoom" name="zoom" min="5" max="100" [(ngModel)]="zoomLevel" />
    <span>{{ zoomLevel }}%</span>

    <label for="search" style="margin-left: 20px;">Search:</label>
    <input type="text" id="search" [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" />
    <button (click)="onSearch()">Search</button>
  </div>
  <div class="thumbnail-container">
    @for (node of nodes(); track node.id) {
    <div class="thumbnail-item" (click)="onThumbnailClick(node)">
      <div class="image-container">
        <img
          src="{{ springService.baseUrl }}/thumbnail/{{
            node?.id
          }}.jpg"
          alt="{{ node.label }}"
        />
      </div>
      <p class="label">{{ node.label }}</p>
    </div>
    }
  </div>
</div>
