<h1>{{ navigator()?.getTitle() }}</h1>

<div class="panel-container" [style.--thumbnail-width.px]="thumbnailWidth">
  <div class="slider-container">
    <label for="zoom">Zoom:</label>
    <input type="range" id="zoom" name="zoom" min="5" max="100" [(ngModel)]="zoomLevel" />
    <span>{{ zoomLevel }}%</span>
  </div>
  <div class="thumbnail-container">
    @for (node of nodes(); track node.id) {
    <div class="thumbnail-item" (click)="onThumbnailClick(node)">
      <div class="image-container">
        <img
          src="{{ springService.SPRING_CONNECTION_URL }}/thumbnail/{{
            node?.id
          }}.jpg"
          alt="{{ node.label }}"
        />
      </div>
      <p class="label">{{ node.label }}</p>
    </div>
    }
  </div>
</div>
