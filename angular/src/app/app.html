<mat-sidenav-container class="app-container">

  <mat-sidenav mode="side" opened="true" fixedInViewport="true" class="sidenav-tree">
      <app-collection-tree></app-collection-tree>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
      @if (nodeStateService.selectedChild$ | async; as selectedChild) {
        <app-picture-viewer [node]="selectedChild"></app-picture-viewer>
      } @else {
        <app-thumbnail-panel></app-thumbnail-panel>
      }
  </mat-sidenav-content>

</mat-sidenav-container>
